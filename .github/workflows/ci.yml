name: CI

# Runs the full test suite on every PR and every push to master. This is the hard gate
# the project previously lacked: the suite was run by hand (and rarely), which is how
# embedding-path regressions reached production. The suite is hermetic and bounded
# (see conftest.py + [tool.pytest.ini_options] in pyproject.toml), so it needs no
# embedding server and cannot hang.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # 2.5.0b1: the pre-b1 audit found lint drift that had accumulated invisibly
    # because CI ran pytest only — ruff is now a gate alongside the suite.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff
        run: uvx ruff@0.15.21 check .

  verify-issues:
    # bug-122 (2.5.0b1 audit C02): the issue registry is the regression contract —
    # 113+ documented patterns pinned to files. It was verified only by hand, so a
    # refactor could silently strip a fix marker (stale pin) without CI noticing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify issue registry
        run: bash scripts/verify-issues.sh

  test:
    runs-on: ubuntu-latest
    # bug-124: the full suite finishes in seconds; a leaked non-daemon thread once
    # kept the step alive to the 6-HOUR default job limit (burning runner time and
    # masking the failure as "cancelled"). Anything past 15 minutes is a hang.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (incl. test toolchain)
        run: uv sync --dev --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest

  mutation-proof:
    # Goal #181 (first increment): the 2.5.2 refactor seams are guarded by
    # scripts/mutation-proof.py, which applies each hand-authored mutation, runs
    # the suite, and asserts the mutant is CAUGHT (or is a documented equivalent
    # mutant). A green suite is not evidence it would go RED on a real regression;
    # this job turns that evidence into a gate. The behaviour-golden differential
    # (scripts/capture-behaviour.py) is already gated by the `test` job — it runs
    # as tests/test_equivalence_252.py under pytest — so it needs no step here.
    #
    # Pinned to 3.13 only to bound cost: the mutations exercise handler logic, not
    # stdlib version edges, so a second Python version would add runtime without
    # adding signal.
    runs-on: ubuntu-latest
    # The script runs the suite up to ~13 times, but caught mutants fail fast (-x)
    # and every test is bounded by the 60s per-test timeout; local wall time is
    # ~12s. 15 minutes is a generous hang ceiling, matching the `test` job.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (incl. test toolchain)
        run: uv sync --dev --python 3.13
      - name: Mutation proof (2.5.2 refactor seams)
        run: uv run --frozen python scripts/mutation-proof.py
