name: CI

# Runs the full test suite on every PR and every push to master. This is the hard gate
# the project previously lacked: the suite was run by hand (and rarely), which is how
# embedding-path regressions reached production. The suite is hermetic and bounded
# (see conftest.py + [tool.pytest.ini_options] in pyproject.toml), so it needs no
# embedding server and cannot hang.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # 2.5.0b1: the pre-b1 audit found lint drift that had accumulated invisibly
    # because CI ran pytest only — ruff is now a gate alongside the suite.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff
        run: uvx ruff@0.15.21 check .

  verify-issues:
    # bug-122 (2.5.0b1 audit C02): the issue registry is the regression contract —
    # 113+ documented patterns pinned to files. It was verified only by hand, so a
    # refactor could silently strip a fix marker (stale pin) without CI noticing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify issue registry
        run: bash scripts/verify-issues.sh

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (incl. test toolchain)
        run: uv sync --dev --python ${{ matrix.python-version }}
      - name: Run tests (DIAGNOSTIC — verbose, fail-fast, thread timeout)
        run: uv run pytest -vv -x --timeout=20 --timeout-method=thread 2>&1 | tee pytest-diag.log
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diag
          path: pytest-diag.log
