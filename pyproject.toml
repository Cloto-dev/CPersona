[project]
name = "cpersona"
version = "2.4.20"
description = "CPersona — Persistent AI memory server with 3-layer hybrid search, confidence scoring, and 24 tools. MIT licensed."
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "mcp>=1.26.0",
    "aiosqlite>=0.20.0",
    "httpx>=0.27.0",
    "numpy>=1.24.0",
    "mcp-common @ git+https://github.com/Cloto-dev/mgp-py.git@mcp-common-v0.5.1#subdirectory=packages/mcp-common",
]

[project.urls]
Homepage = "https://github.com/Cloto-dev/cpersona"
Repository = "https://github.com/Cloto-dev/cpersona"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
# Required because `mcp-common` is declared as a git+URL direct reference
# until mgp-py publishes to PyPI (planned post Phase 5+).
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["."]
