[project]
name = "cpersona"
version = "2.4.10"
description = "CPersona — Persistent AI memory server with 3-layer hybrid search, confidence scoring, and 21 tools. MIT licensed."
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "mcp>=1.26.0",
    "aiosqlite>=0.20.0",
    "httpx>=0.27.0",
    "numpy>=1.24.0",
]

[project.urls]
Homepage = "https://github.com/Cloto-dev/cpersona"
Repository = "https://github.com/Cloto-dev/cpersona"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
